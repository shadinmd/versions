name: Build and Push to GHCR

on:
  push:
    branches:
      - main
      - staging
      - qa
      - dev

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Semantic Release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # Ensure we get the latest commit if release made one

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            # Prioritize the SHA tag so it becomes the 'version' output
            type=sha,prefix=${{ github.ref_name }}-,priority=1000
            type=ref,event=branch,priority=900

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifests:
    needs: [release, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the latest commit on the branch, especially if semantic-release just pushed one
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Update Kustomize image
        run: |
          BRANCH=${{ github.ref_name }}
          FOLDER=$BRANCH
          if [ "$BRANCH" == "main" ]; then FOLDER="main"; fi
          
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:$IMAGE_TAG"
          
          echo "Updating overlay: $FOLDER"
          echo "New image: $FULL_IMAGE"

          cd k8s/overlays/$FOLDER
          # Update the image tag in kustomization.yaml
          # We match the 'versions' name used in your kustomization.yaml
          kustomize edit set image versions=$FULL_IMAGE
          
          echo "Resulting kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/overlays/
          
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to manifests. Skipping commit."
          else
            git commit -m "deploy: update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
