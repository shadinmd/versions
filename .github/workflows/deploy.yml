name: Build and Push to GHCR

on:
  pull_request:
    branches:
      - dev
      - qa
      - staging
      - main
    types:
      - closed
    paths-ignore:
      - 'k8s/**'

env:
  REGISTRY: ghcr.io

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Semantic Release
        id: semantic
        run: |
          npx semantic-release --no-ci
          echo "new_release_version=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    if: github.event.pull_request.merged == true
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ github.base_ref }}-,priority=1000
            type=ref,event=branch,priority=900

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ needs.release.outputs.new_release_version || steps.meta.outputs.version }}

  update-manifests:
    if: github.event.pull_request.merged == true
    needs: [release, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - name: Update Kustomize image
        run: |
          BRANCH=${{ github.base_ref }}
          FOLDER=$BRANCH
          if [ "$BRANCH" = "main" ]; then FOLDER="main"; fi

          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:$IMAGE_TAG"

          cd k8s/overlays/$FOLDER
          kustomize edit set image versions=$FULL_IMAGE

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "deploy: update image tag to ${{ needs.build-and-push.outputs.image_tag }}"
            git pull --rebase origin ${{ github.base_ref }}
            git push
          fi
